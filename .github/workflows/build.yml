name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-${{ runner.os }}-
    
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: ~/.gradle/caches
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Cache Android SDK
      uses: actions/cache@v4
      with:
        path: ~/.buildozer/android/platform/android-sdk
        key: android-sdk-${{ runner.os }}-api34-ndk25b
        restore-keys: |
          android-sdk-${{ runner.os }}-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip git zip unzip openjdk-17-jdk-headless \
          autoconf automake libtool pkg-config \
          libltdl-dev m4 \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev ca-certificates wget
        pip install --upgrade pip setuptools wheel
        pip install --upgrade buildozer cython
    
    - name: Setup Android SDK
      run: |
        export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $ANDROID_SDK_ROOT
        
        # Download Android SDK Command-line Tools
        echo "Downloading Android SDK Command-line Tools..."
        cd $ANDROID_SDK_ROOT
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        rm commandlinetools-linux-11076708_latest.zip
        
        # Create the correct directory structure for sdkmanager
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
        
        # Verify sdkmanager exists at source
        if [ ! -f "cmdline-tools/latest/bin/sdkmanager" ]; then
          echo "ERROR: sdkmanager not found after extraction"
          exit 1
        fi
        
        # Create symlink for backward compatibility with buildozer
        ln -s cmdline-tools/latest $ANDROID_SDK_ROOT/tools
        
        # Create licenses directory and accept licenses
        mkdir -p $ANDROID_SDK_ROOT/licenses
        echo -e "\n8933bad161af4d15e21e9cd5bde69f1d4faf61b\n" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
        echo -e "\n504667f4c0de7973335447fc81eff3b0dfa5d37\n" > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
        
        # Install SDK packages
        echo "Installing SDK packages..."
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platforms;android-34" 2>&1 | tail -5 || true
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "build-tools;35.0.0" 2>&1 | tail -5 || true
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" 2>&1 | tail -5 || true
      timeout-minutes: 60
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    - name: Pre-download Android NDK
      run: |
        export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $ANDROID_SDK_ROOT/ndk
        
        # Check if NDK 25b is already cached
        if [ ! -d "$ANDROID_SDK_ROOT/ndk/25.1.8937393" ]; then
          echo "NDK 25b not found in cache, downloading..."
          cd $ANDROID_SDK_ROOT/ndk
          
          # Download with retry logic
          for i in {1..3}; do
            echo "Download attempt $i/3..."
            if wget -q --timeout=60 https://dl.google.com/android/repository/android-ndk-r25b-linux.zip; then
              echo "Download successful"
              break
            else
              echo "Download failed, retrying..."
              rm -f android-ndk-r25b-linux.zip
              if [ $i -lt 3 ]; then
                sleep 10
              fi
            fi
          done
          
          # Verify file exists before unzipping
          if [ -f "android-ndk-r25b-linux.zip" ]; then
            echo "Extracting NDK..."
            unzip -q android-ndk-r25b-linux.zip
            rm -f android-ndk-r25b-linux.zip
            echo "NDK extraction completed"
          else
            echo "ERROR: NDK download failed after 3 attempts"
            exit 1
          fi
        else
          echo "NDK 25b found in cache, skipping download"
        fi
      timeout-minutes: 60
    
    - name: Accept Android licenses
      run: |
        export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        export ANDROID_NDK_ROOT=$HOME/.buildozer/android/platform/android-sdk/ndk/25.1.8937393
        yes | buildozer android update || true
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    - name: Build APK (with retry and diagnostics)
      run: |
        export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        export ANDROID_NDK_ROOT=$HOME/.buildozer/android/platform/android-sdk/ndk/25.1.8937393
        
        for attempt in {1..3}; do
          echo "Build attempt $attempt/3..."
          if buildozer android debug --debug 2>&1 | tee build_attempt_${attempt}.log; then
            echo "Build succeeded!"
            exit 0
          else
            echo "Build failed on attempt $attempt"
            echo "--- Last 100 lines of build log ---"
            tail -100 build_attempt_${attempt}.log
            echo "--- Checking for download errors ---"
            grep -E "(HTTPError|404|Downloading.*from|Download failed)" build_attempt_${attempt}.log | tail -20 || true
            if [ $attempt -lt 3 ]; then
              echo "Retrying in 30 seconds..."
              sleep 30
            fi
          fi
        done
        echo "Build failed after 3 attempts"
        exit 1
      timeout-minutes: 120
      continue-on-error: false
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        P4A_RELEASE_KEYALIAS: ""
        BUILDOZER_WARN_ON_ROOT: "0"

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: |
          **/*.apk
        retention-days: 5

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-logs
        path: |
          build_attempt_*.log
          .buildozer/android/platform/build-*/build/outputs/logs/
        retention-days: 3
