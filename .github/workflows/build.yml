name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Cache Buildozer
      uses: actions/cache@v3
      with:
        path: ~/.buildozer
        key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-${{ runner.os }}-
    
    - name: Cache Gradle
      uses: actions/cache@v3
      with:
        path: ~/.gradle/caches
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip git zip unzip openjdk-17-jdk-headless \
          autoconf automake libtool pkg-config \
          libltdl-dev m4 \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev ca-certificates
        pip install --upgrade pip setuptools wheel
        pip install buildozer cython

    - name: Set Buildozer config
      run: |
        mkdir -p ~/.buildozer/android/platform
        cat > ~/.buildozer/android/platform/build-tools_settings.gradle << 'EOF'
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        EOF
    
    - name: Accept Android licenses
      run: |
        export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        yes | buildozer android update || true
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    - name: Build APK
      run: |
        buildozer android debug
      timeout-minutes: 120
      continue-on-error: false
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
        retention-days: 5

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-logs
        path: .buildozer/android/platform/build-*/build/outputs/logs/
        retention-days: 3
